[build]
  command = "npm install && npm run build"
  publish = "frontend/dist"

[functions]
  directory = "backend/src/functions"
  node_bundler = "esbuild"

# Proxy requests starting with /api to our serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Proxy static uploads if applicable
[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/api/uploads/:splat"
  status = 200

# Classic SPA redirect for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
